services:
  boost-base:
    build:
      context: .
      dockerfile: Dockerfile.boost
    image: fastleaderboard-boost
    profiles: ["build-only"]
    
  fastleaderboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fastleaderboard-backend
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PORT=8080
      - THREADS=4
      - SECRET_FILE=/run/secrets/secret_key
    restart: unless-stopped
    secrets:
      - secret_key

  redis:
    image: redis:7-alpine
    container_name: fastleaderboard-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  redis-data:

secrets:
  secret_key:
    file: ./secret_key.txt